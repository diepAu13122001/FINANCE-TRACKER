version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       finance_tracker
      POSTGRES_USER:     ft_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persist data — không mất khi container restart
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Chỉ expose local để debug — production không cần
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ft_user -d finance_tracker"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./finance-tracker-be   # đường dẫn đến folder backend
      dockerfile: Dockerfile
    container_name: ft_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy  # đợi postgres sẵn sàng mới start
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/finance_tracker
      SPRING_DATASOURCE_USERNAME: ft_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET:             ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS:      900000
      SPRING_PROFILES_ACTIVE:     prod
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./finance-tracker-fe # đường dẫn đến folder frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    container_name: ft_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: ft_postgres_data